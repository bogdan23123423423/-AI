/* ---------- lightweight markdown-style rendering for assistant replies ---------- */

function formatInline(text, keyPrefix) {
  const parts = text.split(/(\*\*[^*]+\*\*|`[^`]+`)/g).filter((p) => p !== "");
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return <strong key={`${keyPrefix}-b-${i}`}>{part.slice(2, -2)}</strong>;
    }
    if (part.startsWith("`") && part.endsWith("`")) {
      return (
        <code key={`${keyPrefix}-c-${i}`} className="inline-code">
          {part.slice(1, -1)}
        </code>
      );
    }
    return <span key={`${keyPrefix}-t-${i}`}>{part}</span>;
  });
}

function renderMessageBody(text) {
  const blocks = [];
  const codeRegex = /```([\s\S]*?)```/g;
  let lastIndex = 0;
  let match;
  let blockIndex = 0;

  const pushTextBlock = (chunk, keyBase) => {
    const lines = chunk.split("\n");
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      if (/^\s*[-*]\s+/.test(line)) {
        const items = [];
        while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*[-*]\s+/, ""));
          i++;
        }
        blocks.push(
          <ul className="msg-list" key={`${keyBase}-ul-${i}`}>
            {items.map((it, idx) => (
              <li key={idx}>{formatInline(it, `${keyBase}-ul-${i}-${idx}`)}</li>
            ))}
          </ul>
        );
        continue;
      }
      if (/^\s*\d+\.\s+/.test(line)) {
        const items = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
          i++;
        }
        blocks.push(
          <ol className="msg-list" key={`${keyBase}-ol-${i}`}>
            {items.map((it, idx) => (
              <li key={idx}>{formatInline(it, `${keyBase}-ol-${i}-${idx}`)}</li>
            ))}
          </ol>
        );
        continue;
      }
      if (line.trim() === "") {
        i++;
        continue;
      }
      const paraLines = [line];
      i++;
      while (
        i < lines.length &&
        lines[i].trim() !== "" &&
        !/^\s*[-*]\s+/.test(lines[i]) &&
        !/^\s*\d+\.\s+/.test(lines[i])
      ) {
        paraLines.push(lines[i]);
        i++;
      }
      blocks.push(
        <p className="msg-para" key={`${keyBase}-p-${i}`}>
          {paraLines.map((pl, idx) => (
            <span key={idx}>
              {formatInline(pl, `${keyBase}-p-${i}-${idx}`)}
              {idx < paraLines.length - 1 && <br />}
            </span>
          ))}
        </p>
      );
    }
  };

  while ((match = codeRegex.exec(text)) !== null) {
    const before = text.slice(lastIndex, match.index);
    if (before) pushTextBlock(before, `b${blockIndex++}`);
    const codeContent = match[1].replace(/^[a-zA-Z]*\n/, "");
    blocks.push(
      <pre className="msg-code" key={`code-${blockIndex++}`}>
        <code>{codeContent}</code>
      </pre>
    );
    lastIndex = codeRegex.lastIndex;
  }
  const rest = text.slice(lastIndex);
  if (rest) pushTextBlock(rest, `b${blockIndex++}`);

  return blocks;
}

  const [isLoading, setIsLoading] = useState(false);

    typeof window !== "undefined" ? window.innerWidth > 768 : true
  );

  const [lastFailed, setLastFailed] = useState(null);

  const [theme, setTheme] = useState("light");
  const [panelStack, setPanelStack] = useState([]);
  const [account, setAccount] = useState(null);

  const scrollRef = useRef(null);
  const textareaRef = useRef(null);

  const activeChat = chats.find((c) => c.id === activeId) || chats[0];
  const messages = activeChat.messages;
  const currentPanel = panelStack[panelStack.length - 1] || null;

  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages, isLoading]);

  useEffect(() => {
    const ta = textareaRef.current;
    if (ta) {
      ta.style.height = "auto";
      ta.style.height = Math.min(ta.scrollHeight, 200) + "px";
    }
  }, [input]);

  const updateChat = (id, updater) => {
    setChats((prev) => prev.map((c) => (c.id === id ? updater(c) : c)));
  };

  const closeSidebarOnMobile = () => {
    if (typeof window !== "undefined" && window.innerWidth <= 768) {
      setSidebarOpen(false);
    }
  };

  const handleNewChat = () => {
    const chat = makeChat();
    setChats((prev) => [chat, ...prev]);
    setActiveId(chat.id);
    setInput("");
    setError(null);
    setLastFailed(null);
    closeSidebarOnMobile();
  };

  const pushPanel = (p) => setPanelStack((s) => [...s, p]);
  const popPanel = () => setPanelStack((s) => s.slice(0, -1));
  const closePanel = () => setPanelStack([]);

  const sendMessage = useCallback(
    async (rawText) => {
      const text = rawText.trim();
      if (!text || isLoading) return;

      const chatId = activeId;
      const userMsg = { role: "user", text };
      const historyForApi = [...messages, userMsg].map((m) => ({
        role: m.role,
        content: m.text,
      }));

      updateChat(chatId, (c) => ({
        ...c,
        title: c.messages.length === 0 ? text.slice(0, 32) : c.title,
        messages: [...c.messages, userMsg],
      }));
      setInput("");
      setError(null);
      setLastFailed(null);
      setIsLoading(true);

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 1000,
            messages: historyForApi,
          }),
        });

        if (!response.ok) {
          const errBody = await response.text().catch(() => "");
          throw new Error(`HTTP ${response.status}: ${errBody}`);
        }

        const data = await response.json();
        const replyText = (data.content || [])
          .map((b) => (b.type === "text" ? b.text : ""))
          .join("\n")
          .trim();

        updateChat(chatId, (c) => ({
          ...c,
          messages: [...c.messages, { role: "assistant", text: replyText || "…" }],

      } finally {
        setIsLoading(false);
      }
    },
    [activeId, messages, isLoading]
  );

  const handleKeyDown = (e) => {

      sendMessage(input);
    }

        }
        .live-btn:hover{ background:var(--live-bg-hover); }
        .disclaimer{ text-align:center; font-size:11px; color:var(--text-secondary); margin-top:8px; }

        button:focus-visible, textarea:focus-visible{ outline:2px solid #4285F4; outline-offset:2px; }

        /* Settings / Help panel */
        .panel-overlay{ position:fixed; inset:0; background:var(--panel-overlay); z-index:60; display:flex; align-items:flex-end; justify-content:center; }
        .panel-sheet{ background:var(--surface); width:100%; max-width:480px; max-height:82vh; border-radius:20px 20px 0 0; display:flex; flex-direction:column; overflow:hidden; animation:sheetUp .2s ease; }
        @keyframes sheetUp{ from{ transform:translateY(24px); opacity:.4; } to{ transform:translateY(0); opacity:1; } }
        .panel-header{ display:flex; align-items:center; justify-content:space-between; padding:8px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .panel-title{ font-size:16px; font-weight:500; color:var(--text); }
        .panel-body{ overflow-y:auto; padding:8px 8px 28px; }
        .panel-row{ display:flex; align-items:center; gap:14px; width:100%; padding:14px 12px; border:none; background:transparent; border-radius:14px; font-size:15px; color:var(--text); cursor:pointer; text-align:left; }
        .panel-row:hover{ background:var(--hover); }
        .row-chevron{ margin-left:auto; color:var(--text-secondary); }
        .settings-section{ padding:14px 12px 6px; }
        .settings-label{ font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:10px; text-transform:uppercase; letter-spacing:.03em; }
        .theme-toggle{ display:flex; gap:8px; margin-bottom:18px; }
        .theme-btn{ flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; font-size:14px; }
        .theme-btn.active{ background:linear-gradient(120deg,#2E5EEA,#4FC1E0,#6BE7B0); color:#fff; border-color:transparent; }
        .account-row{ display:flex; align-items:center; gap:12px; padding:6px 0 16px; }
        .account-avatar{ width:40px; height:40px; border-radius:50%; background:var(--hover); display:flex; align-items:center; justify-content:center; font-weight:600; color:var(--text); flex-shrink:0; }
        .account-name{ font-size:14px; font-weight:500; color:var(--text); }
        .account-hint{ font-size:12px; color:var(--text-secondary); }
        .auth-btn{ display:flex; align-items:center; gap:12px; width:100%; padding:12px; border:1px solid var(--border); border-radius:14px; background:var(--surface); color:var(--text); font-size:14px; cursor:pointer; margin-bottom:10px; }
        .auth-btn:hover{ background:var(--hover); }
        .google-g{ width:20px; height:20px; border-radius:50%; background:#fff; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#4285F4; flex-shrink:0; }
        .logout-btn{ display:flex; align-items:center; gap:12px; width:100%; padding:12px; border:1px solid var(--border); border-radius:14px; background:transparent; color:#E5484D; font-size:14px; cursor:pointer; }
        .logout-btn:hover{ background:var(--hover); }
        .privacy-text{ padding:4px 12px 8px; }
        .privacy-text p{ font-size:14px; line-height:1.7; color:var(--text); margin:0 0 14px; }
        .privacy-text p:last-child{ margin-bottom:0; }

        @media (max-width:768px){
          .sidebar{ position:fixed; top:0; left:0; bottom:0; z-index:50; transform:translateX(-100%); width:280px; box-shadow:2px 0 12px rgba(0,0,0,.15); }
          .sidebar.closed{ width:280px; padding:12px; overflow:visible; border-right:1px solid var(--border); transform:translateX(-100%); }
          .sidebar.open{ transform:translateX(0); }
          .backdrop.show{ display:block; position:fixed; inset:0; background:rgba(0,0,0,.32); z-index:40; }
        }

        @media (prefers-reduced-motion:reduce){
          .spark-spin, .dot, .msg-row, .panel-sheet{ animation:none; }
        }
      `}</style>

      <SparkDefs />

      {sidebarOpen && (
        <div className="backdrop show" onClick={() => setSidebarOpen(false)} />
      )}

      <aside className={`sidebar ${sidebarOpen ? "open" : "closed"}`}>
        <button className="new-chat-btn" onClick={handleNewChat}>
          <Plus size={18} />
          <span>Новый чат</span>
        </button>
        {historyChats.length > 0 && (
          <div className="history">
            <div className="history-label">Недавние</div>
            {historyChats.map((c) => (
              <button
                key={c.id}
                className={`history-item ${c.id === activeId ? "active" : ""}`}
                onClick={() => {
                  setActiveId(c.id);
                  closeSidebarOnMobile();
                }}
              >
                <MessageSquare size={16} />
                <span>{c.title}</span>
              </button>
            ))}
          </div>
        )}
        <button className="sidebar-bottom-item" onClick={() => pushPanel("menu")}>
          <SettingsIcon size={18} />
          <span>Настройки и справка</span>
        </button>
      </aside>

      <main className="main">
        <header className="topbar">
          <button
            className="icon-btn"
            onClick={() => setSidebarOpen((s) => !s)}
            aria-label="Переключить меню"
          >
            <Menu size={20} />
          </button>
          <div className="topbar-title">
            <Spark size={18} />
            <span>Synra 6.7 elo</span>
            <ChevronDown size={16} className="chevron" />
          </div>
          <div className="topbar-avatar" aria-hidden="true">
            <UserIcon size={18} />
          </div>
        </header>

        <div className="scroll-area" ref={scrollRef}>
          {messages.length === 0 ? (
            <div className="welcome">
              <h1 className="greeting">Привет!</h1>
              <p className="greeting-sub">Чем могу помочь сегодня?</p>
            </div>
          ) : (
            <div className="messages">
              {messages.map((m, i) => (
                <div key={i} className={`msg-row ${m.role}`}>
                  {m.role === "assistant" && (
                    <div className="avatar">
                      <Spark size={18} />
                    </div>
                  )}
                  <div className={`bubble ${m.role}`}>
                    {m.role === "assistant" ? renderMessageBody(m.text) : m.text}
                  </div>
                </div>
              ))}
              {isLoading && (
                <div className="msg-row assistant">
                  <div className="avatar">
                    <Spark size={18} spinning />
                  </div>
                  <div className="bubble assistant thinking">
                    <span className="dot" />
                    <span className="dot" />
                    <span className="dot" />
                  </div>
                </div>
              )}
              {error && (
                <div className="error-box">
                  <span className="error-msg">{error}</span>
                  {lastFailed && (
                    <button
                      className="retry-btn"
                      onClick={() => sendMessage(lastFailed)}
                    >
                      Повторить
                    </button>
                  )}
                </div>
              )}
            </div>
          )}
        </div>

        <div className="input-area">
          <div className="input-pill">
            <button className="icon-btn small" aria-label="Добавить">
              <Plus size={20} />
            </button>
            <textarea
              ref={textareaRef}
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="Спросить Synra"
              rows={1}
            />
            {input.trim() ? (
              <button
                className="send-btn active"
                onClick={() => sendMessage(input)}
                aria-label="Отправить"
              >
                <Send size={18} />
              </button>
            ) : (
              <React.Fragment>
                <button className="icon-btn small" aria-label="Голосовой ввод">
                  <Mic size={18} />
                </button>
                <button className="live-btn" aria-label="Голосовой режим">
                  <AudioLines size={18} />
                </button>
              </React.Fragment>
            )}
          </div>
          <div className="disclaimer">
            Synra может ошибаться. Проверяйте важную информацию.
          </div>
        </div>
      </main>

      {panelStack.length > 0 && (
        <div className="panel-overlay" onClick={closePanel}>
          <div
            className="panel-sheet"
            role="dialog"
            aria-modal="true"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="panel-header">
              {panelStack.length > 1 ? (
                <button className="icon-btn" onClick={popPanel} aria-label="Назад">
                  <ChevronLeft size={20} />
                </button>
              ) : (
                <div style={{ width: 40 }} />
              )}
              <div className="panel-title">{panelTitle(currentPanel)}</div>
              <button className="icon-btn" onClick={closePanel} aria-label="Закрыть">
                <XIcon size={20} />
              </button>
            </div>

            <div className="panel-body">
              {currentPanel === "menu" && (
                <React.Fragment>
                  <button className="panel-row" onClick={() => pushPanel("settings")}>
                    <SettingsIcon size={18} />
                    <span>Настройки</span>
                    <ChevronRight size={16} className="row-chevron" />
                  </button>
                  <button className="panel-row" onClick={() => pushPanel("help")}>
                    <HelpCircle size={18} />
                    <span>Справка</span>
                    <ChevronRight size={16} className="row-chevron" />
                  </button>
                </React.Fragment>
              )}

              {currentPanel === "settings" && (
                <React.Fragment>
                  <div className="settings-section">
                    <div className="settings-label">Тема</div>
                    <div className="theme-toggle">
                      <button
                        className={`theme-btn ${theme === "light" ? "active" : ""}`}
                        onClick={() => setTheme("light")}
                      >
                        <Sun size={16} />
                        <span>Светлая</span>
                      </button>
                      <button
                        className={`theme-btn ${theme === "dark" ? "active" : ""}`}
                        onClick={() => setTheme("dark")}
                      >
                        <Moon size={16} />
                        <span>Тёмная</span>
                      </button>
                    </div>
                  </div>

                  <div className="settings-section">
                    <div className="settings-label">Аккаунт</div>
                    {account ? (
                      <React.Fragment>
                        <div className="account-row">
                          <div className="account-avatar">
                            {account.provider === "Apple" ? (
                              <AppleIcon size={18} />
                            ) : (
                              "G"
                            )}
                          </div>
                          <div>
                            <div className="account-name">
                              Вход через {account.provider}
                            </div>
                            <div className="account-hint">Демонстрационный вход</div>
                          </div>
                        </div>
                        <button className="logout-btn" onClick={() => setAccount(null)}>
                          <LogOut size={18} />
                          <span>Выйти из аккаунта</span>
                        </button>
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <button
                          className="auth-btn"
                          onClick={() => setAccount({ provider: "Google" })}
                        >
                          <span className="google-g">G</span>
                          <span>Войти через Google</span>
                        </button>
                        <button
                          className="auth-btn"
                          onClick={() => setAccount({ provider: "Apple" })}
                        >
                          <AppleIcon size={18} />
                          <span>Войти через Apple</span>
                        </button>
                      </React.Fragment>
                    )}
                  </div>
                </React.Fragment>
              )}

              {currentPanel === "help" && (
                <button className="panel-row" onClick={() => pushPanel("privacy")}>
                  <HelpCircle size={18} />
                  <span>Конфиденциальность и защита данных</span>
                  <ChevronRight size={16} className="row-chevron" />
                </button>
              )}

              {currentPanel === "privacy" && (
                <div className="privacy-text">
                  {PRIVACY_PARAGRAPHS.map((p, i) => (
                    <p key={i}>{p}</p>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
