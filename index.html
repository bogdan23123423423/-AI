/* ---------- lightweight markdown-style rendering for assistant replies ---------- */

function formatInline(text, keyPrefix) {
  const parts = text.split(/(\*\*[^*]+\*\*|`[^`]+`)/g).filter((p) => p !== "");
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return <strong key={`${keyPrefix}-b-${i}`}>{part.slice(2, -2)}</strong>;
    }
    if (part.startsWith("`") && part.endsWith("`")) {
      return (
        <code key={`${keyPrefix}-c-${i}`} className="inline-code">
          {part.slice(1, -1)}
        </code>
      );
    }
    return <span key={`${keyPrefix}-t-${i}`}>{part}</span>;
  });
}

function renderMessageBody(text) {
  const blocks = [];
  const codeRegex = /```([\s\S]*?)```/g;
  let lastIndex = 0;
  let match;
  let blockIndex = 0;

  const pushTextBlock = (chunk, keyBase) => {
    const lines = chunk.split("\n");
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      if (/^\s*[-*]\s+/.test(line)) {
        const items = [];
        while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*[-*]\s+/, ""));
          i++;
        }
        blocks.push(
          <ul className="msg-list" key={`${keyBase}-ul-${i}`}>
            {items.map((it, idx) => (
              <li key={idx}>{formatInline(it, `${keyBase}-ul-${i}-${idx}`)}</li>
            ))}
          </ul>
        );
        continue;
      }
      if (/^\s*\d+\.\s+/.test(line)) {
        const items = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          items.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
          i++;
        }
        blocks.push(
          <ol className="msg-list" key={`${keyBase}-ol-${i}`}>
            {items.map((it, idx) => (
              <li key={idx}>{formatInline(it, `${keyBase}-ol-${i}-${idx}`)}</li>
            ))}
          </ol>
        );
        continue;
      }
      if (line.trim() === "") {
        i++;
        continue;
      }
      const paraLines = [line];
      i++;
      while (
        i < lines.length &&
        lines[i].trim() !== "" &&
        !/^\s*[-*]\s+/.test(lines[i]) &&
        !/^\s*\d+\.\s+/.test(lines[i])
      ) {
        paraLines.push(lines[i]);
        i++;
      }
      blocks.push(
        <p className="msg-para" key={`${keyBase}-p-${i}`}>
          {paraLines.map((pl, idx) => (
            <span key={idx}>
              {formatInline(pl, `${keyBase}-p-${i}-${idx}`)}
              {idx < paraLines.length - 1 && <br />}
            </span>
          ))}
        </p>
      );
    }
  };

  while ((match = codeRegex.exec(text)) !== null) {
    const before = text.slice(lastIndex, match.index);
    if (before) pushTextBlock(before, `b${blockIndex++}`);
    const codeContent = match[1].replace(/^[a-zA-Z]*\n/, "");
    blocks.push(
      <pre className="msg-code" key={`code-${blockIndex++}`}>
        <code>{codeContent}</code>
      </pre>
    );
    lastIndex = codeRegex.lastIndex;
  }
  const rest = text.slice(lastIndex);
  if (rest) pushTextBlock(rest, `b${blockIndex++}`);

  return blocks;
}

      setXConfirmed(false);

    setSelectedModel(model);

    if (pendingModel) {
      setUnlockedIds((prev) => [...prev, pendingModel.id]);
      setSelectedModel(pendingModel);
    }
    closePanel();
  };

  const handleTelegramAuth = useCallback(async (user) => {
    setTelegramUser(user);
    setTelegramChecking(true);
    setTelegramError(null);
    try {
      const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-App-Secret": APP_SECRET },
        body: JSON.stringify({ action: "verify-telegram", telegramAuth: user }),
      });
      const data = await response.json();
      if (data.verified) {
        setTelegramVerified(true);
      } else {
        setTelegramVerified(false);
        setTelegramError(
          data.error || "Похоже, вы не подписаны на канал. Подпишитесь и попробуйте ещё раз."

      }
    } catch (err) {
      setTelegramVerified(false);
      setTelegramError("Не удалось проверить подписку — проверьте настройку бэкенда.");
    } finally {
      setTelegramChecking(false);
    }
  }, []);

    window.onTelegramAuth = handleTelegramAuth;
    return () => {
      delete window.onTelegramAuth;
    };
  }, [handleTelegramAuth]);

  useEffect(() => {

      !telegramVerified &&

      const userMsg = { role: "user", text };
      const historyForApi = [...messages, userMsg].map((m) => ({

        );
      } finally {
        setIsLoading(false);
      }
    },
    [activeId, messages, isLoading]

                      openExternal("https://t.me/securelinevpnbk");
                    }}
                  >
                    <span className="social-icon">
                      <TelegramIcon size={20} />
                    </span>
                    <span className="social-text">
                      <span className="social-name">Telegram</span>
                      <span className="social-handle">@securelinevpnbk</span>
                    </span>
                    <ChevronRight size={18} className="social-arrow" />
                  </a>

                  <div className="telegram-verify-box">
                    {telegramVerified ? (
                      <div className="verify-ok">
                        <Check size={16} />
                        <span>Подписка подтверждена{telegramUser && telegramUser.first_name ? ` — ${telegramUser.first_name}` : ""}</span>
                      </div>
                    ) : TELEGRAM_BOT_USERNAME.indexOf("REPLACE") !== -1 ? (
                      <div className="verify-hint">
                        Бот ещё не настроен — впишите TELEGRAM_BOT_USERNAME в файл (см. ИНСТРУКЦИЯ-TELEGRAM-BOT.txt).
                      </div>
                    ) : (
                      <React.Fragment>
                        <div ref={telegramWidgetRef} className="telegram-widget-slot" />
                        {telegramChecking && <div className="verify-hint">Проверяем подписку…</div>}
                        {telegramError && <div className="verify-error">{telegramError}</div>}
                      </React.Fragment>
                    )}
                  </div>

                  <a
                    className="social-card xapp"
                    href="https://x.com/securelinevpn?s=21"
                    onClick={(e) => {
                      e.preventDefault();
                      openExternal("https://x.com/securelinevpn?s=21");
                    }}
                  >
                    <span className="social-icon">
                      <BrandXIcon size={16} />
                    </span>
                    <span className="social-text">
                      <span className="social-name">X (Twitter)</span>
                      <span className="social-handle">@securelinevpn</span>
                    </span>
                    <ChevronRight size={18} className="social-arrow" />
                  </a>

                  <label className="x-confirm-row">
                    <input
                      type="checkbox"
                      checked={xConfirmed}
                      onChange={(e) => setXConfirmed(e.target.checked)}
                    />
                    <span>Я подписался на X (без автоматической проверки — честное слово)</span>
                  </label>

                  <button
                    className="unlock-confirm"
                    disabled={!telegramVerified || !xConfirmed}
                    onClick={handleConfirmUnlock}
                  >
                    {telegramVerified && xConfirmed ? "Разблокировать" : "Выполните оба условия выше"}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {voiceOpen && (
        <div className="voice-overlay">
          <button
            className="voice-top-close"
            onClick={() => setVoiceOpen(false)}
            aria-label="Закрыть голосовой режим"
          >
            <XIcon size={20} />
          </button>

          <div className="voice-controls">
            <button className="voice-icon-btn disabled" disabled aria-label="Камера (пока не работает)">
              <CameraIcon size={18} />
            </button>
            <button className="voice-icon-btn disabled" disabled aria-label="Поделиться (пока не работает)">
              <ShareUpIcon size={18} />
            </button>
            <div className="voice-blob" aria-hidden="true" />
            <button className="voice-icon-btn disabled" disabled aria-label="Микрофон (пока не работает)">
              <Mic size={18} />
            </button>
            <button
              className="voice-icon-btn"
              onClick={() => setVoiceOpen(false)}
              aria-label="Закрыть"
            >
              <XIcon size={18} />
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
